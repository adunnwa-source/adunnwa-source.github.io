<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP.EXE - Hannah & Andy's Wedding Portal</title>
  <style>
    /* Global Retro Operating System Environment */
    body {
      background-color: #008080; /* Classic Windows 95 Teal Background */
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    :root {
      --win-gray: #c0c0c0;
      --win-white: #ffffff;
      --win-dark-gray: #808080;
      --win-black: #000000;
      --win-blue: #000080;
    }

    /* Main Desktop Window Frame */
    .exe-container {
      width: 100%;
      max-width: 550px;
      background-color: var(--win-gray);
      border: 2px solid;
      border-color: var(--win-white) var(--win-dark-gray) var(--win-dark-gray) var(--win-white);
      padding: 3px;
      font-family: "MS Sans Serif", "Courier New", sans-serif;
      color: var(--win-black);
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
    }

    /* Top Title Strip */
    .title-bar {
      background-color: var(--win-blue);
      color: var(--win-white);
      padding: 4px 6px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .title-btn {
      background-color: var(--win-gray);
      border: 1px solid;
      border-color: var(--win-white) var(--win-dark-gray) var(--win-dark-gray) var(--win-white);
      font-size: 10px;
      width: 16px;
      height: 14px;
      text-align: center;
      line-height: 10px;
      cursor: pointer;
      font-weight: bold;
      color: var(--win-black);
    }

    /* Classic App Menu Bar (Navigation) */
    .win-menu-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 6px;
      border-bottom: 1px solid var(--win-dark-gray);
      font-size: 12px;
    }

    .menu-left, .menu-right {
      display: flex;
      gap: 12px;
    }

    .win-menu-bar a {
      color: var(--win-black);
      text-decoration: none;
      padding: 2px 4px;
    }

    .win-menu-bar a:hover {
      background-color: var(--win-blue);
      color: var(--win-white);
      cursor: pointer;
    }

    .win-menu-bar a.active {
      font-weight: bold;
    }

    .form-body {
      padding: 15px;
    }

    .welcome-banner {
      background-color: var(--win-white);
      border: 2px inset;
      border-color: var(--win-dark-gray) var(--win-white) var(--win-white) var(--win-dark-gray);
      padding: 10px;
      margin-bottom: 20px;
      font-size: 12px;
      line-height: 1.4;
    }

    .welcome-banner h1 {
      margin-top: 0;
      margin-bottom: 5px;
      font-size: 16px;
      color: var(--win-blue);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 6px;
    }

    /* Classic Windows 3D Inset Inputs */
    .win-input, .win-textarea {
      width: 100%;
      box-sizing: border-box;
      background-color: var(--win-white);
      border: 2px solid;
      border-color: var(--win-dark-gray) var(--win-white) var(--win-white) var(--win-dark-gray);
      padding: 5px;
      font-family: inherit;
      font-size: 12px;
      color: var(--win-black);
    }

    .win-textarea {
      resize: vertical;
      height: 60px;
    }

    .radio-checkbox-group {
      background: var(--win-white);
      border: 2px solid;
      border-color: var(--win-dark-gray) var(--win-white) var(--win-white) var(--win-dark-gray);
      padding: 10px;
      margin-top: 4px;
    }

    .win-option {
      display: flex;
      align-items: center;
      font-size: 12px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .win-option:last-child {
      margin-bottom: 0;
    }

    .win-option input {
      margin-right: 8px;
    }

    .win-divider {
      border: none;
      border-top: 1px solid var(--win-dark-gray);
      border-bottom: 1px solid var(--win-white);
      margin: 18px 0;
    }

    /* Action Command Buttons */
    .btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 15px;
    }

    .win-btn {
      background-color: var(--win-gray);
      border: 2px solid;
      border-color: var(--win-white) var(--win-dark-gray) var(--win-dark-gray) var(--win-white);
      padding: 4px 18px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      color: var(--win-black);
      box-shadow: 0 0 0 1px var(--win-black);
      outline: none;
    }

    .win-btn:active {
      border-color: var(--win-dark-gray) var(--win-white) var(--win-white) var(--win-dark-gray);
      padding: 5px 17px 3px 19px;
    }

    .win-btn:focus {
      outline: 1px dotted var(--win-black);
      outline-offset: -4px;
    }

    /* System notification block */
    #decline-notice {
      background-color: #f6f6f6;
      border: 2px inset;
      border-color: var(--win-dark-gray) var(--win-white) var(--win-white) var(--win-dark-gray);
      padding: 12px;
      font-size: 12px;
      text-align: center;
      color: #800000;
    }

    /* Simple Footer Status Bar */
    .status-bar {
      margin-top: 15px;
      border-top: 1px solid var(--win-dark-gray);
      padding-top: 4px;
      font-size: 10px;
      color: #404040;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
